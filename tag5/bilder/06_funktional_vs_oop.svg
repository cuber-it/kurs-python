<svg xmlns="http://www.w3.org/2000/svg" width="680" height="300" viewBox="0 0 680 300" font-family="Inter, 'Segoe UI', Arial, sans-serif">
  <title>Funktional vs. objektorientiert</title>
  <desc>Funktional reicht man die Daten durch einzelne Funktionen. Objektorientiert buendelt ein Objekt Daten und Methoden, das man direkt fragt.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <text x="150" y="42" text-anchor="middle" font-size="13" font-weight="500" fill="#5F5E5A">funktional  -  Tag 4</text>
  <text x="495" y="42" text-anchor="middle" font-size="13" font-weight="500" fill="#085041">OOP  -  Tag 5</text>

  <rect x="60" y="56" width="160" height="40" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="1"/>
  <text x="140" y="81" text-anchor="middle" font-size="13" font-family="'JetBrains Mono', Consolas, monospace" fill="#2C2C2A">daten (Liste)</text>

  <path d="M140 96 L140 118 L40 118 L40 268" fill="none" stroke="#888780" stroke-width="1"/>
  <line x1="40" y1="164" x2="58" y2="164" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="40" y1="216" x2="58" y2="216" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="40" y1="268" x2="58" y2="268" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="60" y="144" width="200" height="40" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="1"/>
  <text x="160" y="169" text-anchor="middle" font-size="13" font-family="'JetBrains Mono', Consolas, monospace" fill="#712B13">mittel(daten)</text>
  <rect x="60" y="196" width="200" height="40" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="1"/>
  <text x="160" y="221" text-anchor="middle" font-size="13" font-family="'JetBrains Mono', Consolas, monospace" fill="#712B13">hoch(daten)</text>
  <rect x="60" y="248" width="200" height="40" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="1"/>
  <text x="160" y="273" text-anchor="middle" font-size="13" font-family="'JetBrains Mono', Consolas, monospace" fill="#712B13">sma(daten, 20)</text>

  <text x="319" y="160" text-anchor="middle" font-size="12" fill="#5F5E5A">als Klasse buendeln</text>
  <line x1="272" y1="172" x2="366" y2="172" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="370" y="56" width="250" height="232" rx="14" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/>
  <text x="495" y="84" text-anchor="middle" font-size="13" font-weight="500" font-family="'JetBrains Mono', Consolas, monospace" fill="#085041">reihe = Kursreihe(daten)</text>

  <rect x="390" y="100" width="110" height="32" rx="8" fill="#FFFFFF" stroke="#0F6E56" stroke-width="1"/>
  <text x="445" y="121" text-anchor="middle" font-size="12" font-family="'JetBrains Mono', Consolas, monospace" fill="#0F6E56">daten</text>

  <rect x="390" y="146" width="210" height="34" rx="8" fill="#FFFFFF" stroke="#0F6E56" stroke-width="1"/>
  <text x="404" y="168" font-size="13" font-family="'JetBrains Mono', Consolas, monospace" fill="#085041">reihe.mittel()</text>
  <rect x="390" y="190" width="210" height="34" rx="8" fill="#FFFFFF" stroke="#0F6E56" stroke-width="1"/>
  <text x="404" y="212" font-size="13" font-family="'JetBrains Mono', Consolas, monospace" fill="#085041">reihe.hoch()</text>
  <rect x="390" y="234" width="210" height="34" rx="8" fill="#FFFFFF" stroke="#0F6E56" stroke-width="1"/>
  <text x="404" y="256" font-size="13" font-family="'JetBrains Mono', Consolas, monospace" fill="#085041">reihe.sma(20)</text>
</svg>
