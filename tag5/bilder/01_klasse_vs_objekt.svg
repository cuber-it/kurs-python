<svg xmlns="http://www.w3.org/2000/svg" width="680" height="300" viewBox="0 0 680 300" font-family="Inter, 'Segoe UI', Arial, sans-serif">
  <title>Klasse als Bauplan, Objekte als Instanzen</title>
  <desc>Die Klasse Hund ist ein Bauplan. Aus ihr entstehen zwei unabhaengige Objekte rex und bella mit eigenen Werten.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect x="40" y="70" width="234" height="150" rx="12" fill="#EEEDFE" stroke="#534AB7" stroke-width="1"/>
  <text x="157" y="100" text-anchor="middle" font-size="15" font-weight="500" fill="#3C3489">class Hund</text>
  <text x="157" y="120" text-anchor="middle" font-size="12" fill="#534AB7">Bauplan, beschreibt nur</text>
  <line x1="58" y1="136" x2="256" y2="136" stroke="#534AB7" stroke-width="0.5" opacity="0.4"/>
  <text x="58" y="166" font-size="12" fill="#534AB7">Attribute: name, alter</text>
  <text x="58" y="194" font-size="12" fill="#534AB7">Methoden: bellen, geburtstag</text>

  <text x="352" y="90" text-anchor="middle" font-size="12" font-family="'JetBrains Mono', Consolas, monospace" fill="#5F5E5A">Hund('Rex', 3)</text>
  <line x1="274" y1="112" x2="424" y2="100" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="352" y="202" text-anchor="middle" font-size="12" font-family="'JetBrains Mono', Consolas, monospace" fill="#5F5E5A">Hund('Bella', 5)</text>
  <line x1="274" y1="180" x2="424" y2="206" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="430" y="62" width="210" height="84" rx="12" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/>
  <text x="448" y="90" font-size="15" font-weight="500" fill="#085041">rex</text>
  <text x="448" y="113" font-size="13" font-family="'JetBrains Mono', Consolas, monospace" fill="#0F6E56">name = 'Rex'</text>
  <text x="448" y="133" font-size="13" font-family="'JetBrains Mono', Consolas, monospace" fill="#0F6E56">alter = 3</text>

  <rect x="430" y="170" width="210" height="84" rx="12" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/>
  <text x="448" y="198" font-size="15" font-weight="500" fill="#085041">bella</text>
  <text x="448" y="221" font-size="13" font-family="'JetBrains Mono', Consolas, monospace" fill="#0F6E56">name = 'Bella'</text>
  <text x="448" y="241" font-size="13" font-family="'JetBrains Mono', Consolas, monospace" fill="#0F6E56">alter = 5</text>
</svg>
