<svg xmlns="http://www.w3.org/2000/svg" width="680" height="296" viewBox="0 0 680 296" font-family="Inter, 'Segoe UI', Arial, sans-serif">
  <title>Vererbung: Tier, Hund, Katze</title>
  <desc>Die Basisklasse Tier wird von Hund und Katze beerbt. fressen wird geerbt, laut_geben wird in jeder Unterklasse ueberschrieben.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect x="250" y="46" width="180" height="64" rx="12" fill="#E6F1FB" stroke="#185FA5" stroke-width="1"/>
  <text x="340" y="74" text-anchor="middle" font-size="15" font-weight="500" fill="#0C447C">class Tier</text>
  <text x="340" y="94" text-anchor="middle" font-size="12" font-family="'JetBrains Mono', Consolas, monospace" fill="#185FA5">fressen(), laut_geben()</text>

  <path d="M340 110 L340 150 L210 150 L210 176" fill="none" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
  <path d="M340 110 L340 150 L470 150 L470 176" fill="none" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
  <text x="268" y="144" text-anchor="middle" font-size="12" fill="#5F5E5A">ist ein</text>
  <text x="412" y="144" text-anchor="middle" font-size="12" fill="#5F5E5A">ist ein</text>

  <rect x="110" y="180" width="200" height="92" rx="12" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/>
  <text x="210" y="208" text-anchor="middle" font-size="14" font-weight="500" font-family="'JetBrains Mono', Consolas, monospace" fill="#085041">class Hund(Tier)</text>
  <text x="126" y="234" font-size="12" font-family="'JetBrains Mono', Consolas, monospace" fill="#888780">fressen()  -  geerbt</text>
  <text x="126" y="258" font-size="12" font-family="'JetBrains Mono', Consolas, monospace" fill="#085041">laut_geben()  -  Wuff!</text>

  <rect x="370" y="180" width="200" height="92" rx="12" fill="#FAECE7" stroke="#993C1D" stroke-width="1"/>
  <text x="470" y="208" text-anchor="middle" font-size="14" font-weight="500" font-family="'JetBrains Mono', Consolas, monospace" fill="#712B13">class Katze(Tier)</text>
  <text x="386" y="234" font-size="12" font-family="'JetBrains Mono', Consolas, monospace" fill="#888780">fressen()  -  geerbt</text>
  <text x="386" y="258" font-size="12" font-family="'JetBrains Mono', Consolas, monospace" fill="#712B13">laut_geben()  -  Miau!</text>
</svg>
