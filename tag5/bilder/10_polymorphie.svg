<svg xmlns="http://www.w3.org/2000/svg" width="680" height="262" viewBox="0 0 680 262" font-family="Inter, 'Segoe UI', Arial, sans-serif">
  <title>Polymorphie: ein Aufruf, viele Stimmen</title>
  <desc>Dieselbe Schleife ruft t.laut_geben() auf. Jede Klasse - Hund, Katze, Ente, Roboter - antwortet auf ihre eigene Art.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect x="40" y="98" width="176" height="70" rx="10" fill="#F1EFE8" stroke="#888780" stroke-width="1"/>
  <text x="128" y="126" text-anchor="middle" font-size="12" font-family="'JetBrains Mono', Consolas, monospace" fill="#5F5E5A">for t in tiere:</text>
  <text x="128" y="148" text-anchor="middle" font-size="14" font-family="'JetBrains Mono', Consolas, monospace" fill="#2C2C2A">t.laut_geben()</text>

  <line x1="216" y1="133" x2="296" y2="62" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="216" y1="133" x2="296" y2="118" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="216" y1="133" x2="296" y2="174" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="216" y1="133" x2="296" y2="230" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="300" y="40" width="200" height="44" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/>
  <text x="316" y="67" font-size="13" font-family="'JetBrains Mono', Consolas, monospace" fill="#085041">Hund</text>
  <text x="484" y="67" text-anchor="end" font-size="13" font-family="'JetBrains Mono', Consolas, monospace" fill="#085041">"Wuff!"</text>

  <rect x="300" y="96" width="200" height="44" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="1"/>
  <text x="316" y="123" font-size="13" font-family="'JetBrains Mono', Consolas, monospace" fill="#712B13">Katze</text>
  <text x="484" y="123" text-anchor="end" font-size="13" font-family="'JetBrains Mono', Consolas, monospace" fill="#712B13">"Miau!"</text>

  <rect x="300" y="152" width="200" height="44" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="1"/>
  <text x="316" y="179" font-size="13" font-family="'JetBrains Mono', Consolas, monospace" fill="#633806">Ente</text>
  <text x="484" y="179" text-anchor="end" font-size="13" font-family="'JetBrains Mono', Consolas, monospace" fill="#633806">"Quak!"</text>

  <rect x="300" y="208" width="200" height="44" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="1"/>
  <text x="316" y="235" font-size="13" font-family="'JetBrains Mono', Consolas, monospace" fill="#0C447C">Roboter</text>
  <text x="484" y="235" text-anchor="end" font-size="13" font-family="'JetBrains Mono', Consolas, monospace" fill="#0C447C">"Beep!"</text>

  <text x="560" y="140" text-anchor="middle" font-size="12" fill="#5F5E5A">ein Aufruf,</text>
  <text x="560" y="158" text-anchor="middle" font-size="12" fill="#5F5E5A">viele Stimmen</text>
</svg>
