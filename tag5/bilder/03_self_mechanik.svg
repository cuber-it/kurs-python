<svg xmlns="http://www.w3.org/2000/svg" width="680" height="268" viewBox="0 0 680 268" font-family="Inter, 'Segoe UI', Arial, sans-serif">
  <title>self wird automatisch eingesetzt</title>
  <desc>rex.bellen() entspricht Hund.bellen(rex). Python setzt das Objekt selbst als self ein. Allgemein gilt obj.methode() entspricht Klasse.methode(obj).</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect x="60" y="64" width="210" height="74" rx="12" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/>
  <text x="165" y="100" text-anchor="middle" font-size="15" font-family="'JetBrains Mono', Consolas, monospace" fill="#085041">rex.bellen()</text>
  <text x="165" y="122" text-anchor="middle" font-size="12" fill="#0F6E56">dein Aufruf</text>

  <text x="335" y="92" text-anchor="middle" font-size="12" fill="#5F5E5A">Python macht daraus</text>
  <line x1="272" y1="101" x2="398" y2="101" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="400" y="64" width="220" height="74" rx="12" fill="#EEEDFE" stroke="#534AB7" stroke-width="1"/>
  <text x="510" y="100" text-anchor="middle" font-size="15" font-family="'JetBrains Mono', Consolas, monospace" fill="#3C3489">Hund.bellen(rex)</text>
  <text x="510" y="122" text-anchor="middle" font-size="12" font-family="'JetBrains Mono', Consolas, monospace" fill="#534AB7">self = rex</text>

  <line x1="60" y1="178" x2="620" y2="178" stroke="#D3D1C7" stroke-width="0.5"/>
  <text x="60" y="172" font-size="12" fill="#5F5E5A">allgemein</text>

  <rect x="60" y="194" width="210" height="50" rx="10" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="1"/>
  <text x="165" y="224" text-anchor="middle" font-size="14" font-family="'JetBrains Mono', Consolas, monospace" fill="#2C2C2A">obj.methode(a)</text>

  <line x1="272" y1="219" x2="398" y2="219" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="400" y="194" width="220" height="50" rx="10" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="1"/>
  <text x="510" y="224" text-anchor="middle" font-size="14" font-family="'JetBrains Mono', Consolas, monospace" fill="#2C2C2A">Klasse.methode(obj, a)</text>
</svg>
