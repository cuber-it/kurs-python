<svg xmlns="http://www.w3.org/2000/svg" width="680" height="280" viewBox="0 0 680 280" font-family="Inter, 'Segoe UI', Arial, sans-serif">
  <title>Attribut-Lookup: erst im Objekt, dann in der Klasse</title>
  <desc>Bei rex.bellen() sucht Python zuerst im Objekt rex nach dem Namen, findet dort nur Daten, und sucht dann in der Klasse Hund, wo die Methode liegt.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrowp" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#534AB7" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect x="40" y="118" width="150" height="48" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="1"/>
  <text x="115" y="147" text-anchor="middle" font-size="14" font-family="'JetBrains Mono', Consolas, monospace" fill="#2C2C2A">rex.bellen()</text>

  <path d="M190 150 L218 198" fill="none" stroke="#888780" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
  <text x="120" y="200" text-anchor="middle" font-size="12" fill="#5F5E5A">1) im Objekt? nein</text>

  <rect x="240" y="40" width="210" height="100" rx="12" fill="#EEEDFE" stroke="#534AB7" stroke-width="1"/>
  <text x="256" y="64" font-size="13" font-weight="500" font-family="'JetBrains Mono', Consolas, monospace" fill="#3C3489">class Hund  (geteilt)</text>
  <text x="256" y="88" font-size="12" font-family="'JetBrains Mono', Consolas, monospace" fill="#534AB7">bellen()</text>
  <text x="256" y="108" font-size="12" font-family="'JetBrains Mono', Consolas, monospace" fill="#534AB7">geburtstag()</text>
  <text x="256" y="128" font-size="12" font-family="'JetBrains Mono', Consolas, monospace" fill="#534AB7">art = 'Canis l.'</text>

  <rect x="240" y="166" width="210" height="92" rx="12" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/>
  <text x="256" y="190" font-size="13" font-weight="500" font-family="'JetBrains Mono', Consolas, monospace" fill="#085041">rex  (eigene Daten)</text>
  <text x="256" y="214" font-size="12" font-family="'JetBrains Mono', Consolas, monospace" fill="#0F6E56">name = 'Rex'</text>
  <text x="256" y="234" font-size="12" font-family="'JetBrains Mono', Consolas, monospace" fill="#0F6E56">alter = 3</text>

  <path d="M345 166 L345 144" fill="none" stroke="#534AB7" stroke-width="1.25" stroke-dasharray="4 3" marker-end="url(#arrowp)"/>

  <text x="478" y="150" font-size="12" font-weight="500" fill="#3C3489">2) in der Klasse?</text>
  <text x="478" y="170" font-size="12" fill="#534AB7">ja -&gt; bellen() gefunden</text>
</svg>
