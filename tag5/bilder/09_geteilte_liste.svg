<svg xmlns="http://www.w3.org/2000/svg" width="680" height="232" viewBox="0 0 680 232" font-family="Inter, 'Segoe UI', Arial, sans-serif">
  <title>Die Falle der geteilten Liste</title>
  <desc>Eine Liste als Klassenattribut wird von allen Objekten geteilt. Richtig ist, die Liste pro Objekt in __init__ anzulegen, dann hat jedes Objekt seine eigene.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <text x="185" y="40" text-anchor="middle" font-size="13" font-weight="500" fill="#791F1F">falsch: geteilte Liste</text>
  <text x="510" y="40" text-anchor="middle" font-size="13" font-weight="500" fill="#173404">richtig: eigene Liste</text>
  <line x1="355" y1="52" x2="355" y2="208" stroke="#D3D1C7" stroke-width="0.75"/>

  <rect x="50" y="64" width="96" height="44" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/>
  <text x="98" y="91" text-anchor="middle" font-size="14" font-family="'JetBrains Mono', Consolas, monospace" fill="#085041">g1</text>
  <rect x="50" y="124" width="96" height="44" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/>
  <text x="98" y="151" text-anchor="middle" font-size="14" font-family="'JetBrains Mono', Consolas, monospace" fill="#085041">g2</text>

  <line x1="146" y1="92" x2="198" y2="110" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="146" y1="140" x2="198" y2="122" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="200" y="88" width="134" height="56" rx="8" fill="#FCEBEB" stroke="#A32D2D" stroke-width="1"/>
  <text x="267" y="121" text-anchor="middle" font-size="13" font-family="'JetBrains Mono', Consolas, monospace" fill="#791F1F">['Anna', 'Ben']</text>
  <text x="267" y="170" text-anchor="middle" font-size="12" fill="#791F1F">eine Liste fuer beide</text>
  <text x="185" y="196" text-anchor="middle" font-size="12" font-family="'JetBrains Mono', Consolas, monospace" fill="#A32D2D">mitglieder = []  (Klasse)</text>

  <rect x="392" y="64" width="96" height="44" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/>
  <text x="440" y="91" text-anchor="middle" font-size="14" font-family="'JetBrains Mono', Consolas, monospace" fill="#085041">r1</text>
  <rect x="392" y="124" width="96" height="44" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/>
  <text x="440" y="151" text-anchor="middle" font-size="14" font-family="'JetBrains Mono', Consolas, monospace" fill="#085041">r2</text>

  <line x1="488" y1="86" x2="518" y2="86" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="488" y1="146" x2="518" y2="146" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="520" y="64" width="120" height="44" rx="8" fill="#EAF3DE" stroke="#3B6D11" stroke-width="1"/>
  <text x="580" y="91" text-anchor="middle" font-size="13" font-family="'JetBrains Mono', Consolas, monospace" fill="#173404">['Anna']</text>
  <rect x="520" y="124" width="120" height="44" rx="8" fill="#EAF3DE" stroke="#3B6D11" stroke-width="1"/>
  <text x="580" y="151" text-anchor="middle" font-size="13" font-family="'JetBrains Mono', Consolas, monospace" fill="#173404">['Ben']</text>

  <text x="510" y="196" text-anchor="middle" font-size="12" font-family="'JetBrains Mono', Consolas, monospace" fill="#3B6D11">self.mitglieder = [name]  (__init__)</text>
</svg>
