<svg xmlns="http://www.w3.org/2000/svg" width="680" height="220" viewBox="0 0 680 220" font-family="Inter, 'Segoe UI', Arial, sans-serif">
  <title>Objektbau: was bei Hund('Rex', 3) passiert</title>
  <desc>Der Aufruf legt ein leeres Objekt an, __init__ laeuft mit self als Verweis auf dieses Objekt und fuellt die Attribute, dann kommt das fertige Objekt zurueck.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect x="40" y="60" width="170" height="96" rx="10" fill="#F1EFE8" stroke="#888780" stroke-width="1"/>
  <text x="125" y="102" text-anchor="middle" font-size="14" font-family="'JetBrains Mono', Consolas, monospace" fill="#2C2C2A">Hund('Rex', 3)</text>
  <text x="125" y="126" text-anchor="middle" font-size="12" fill="#5F5E5A">der Aufruf</text>

  <line x1="214" y1="108" x2="244" y2="108" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="248" y="60" width="200" height="96" rx="10" fill="#FAEEDA" stroke="#854F0B" stroke-width="1"/>
  <text x="348" y="92" text-anchor="middle" font-size="13" font-family="'JetBrains Mono', Consolas, monospace" fill="#633806">__init__(self, ...)</text>
  <text x="348" y="114" text-anchor="middle" font-size="12" fill="#854F0B">self = das neue Objekt</text>
  <text x="348" y="136" text-anchor="middle" font-size="12" font-family="'JetBrains Mono', Consolas, monospace" fill="#854F0B">self.name = 'Rex'</text>

  <line x1="452" y1="108" x2="482" y2="108" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="486" y="60" width="154" height="96" rx="10" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/>
  <text x="502" y="90" font-size="14" font-weight="500" font-family="'JetBrains Mono', Consolas, monospace" fill="#085041">rex</text>
  <text x="502" y="114" font-size="12" font-family="'JetBrains Mono', Consolas, monospace" fill="#0F6E56">name = 'Rex'</text>
  <text x="502" y="136" font-size="12" font-family="'JetBrains Mono', Consolas, monospace" fill="#0F6E56">alter = 3</text>

  <text x="340" y="190" text-anchor="middle" font-size="12" fill="#5F5E5A">self ist nur ein Name fuer "dieses Objekt hier"</text>
</svg>
