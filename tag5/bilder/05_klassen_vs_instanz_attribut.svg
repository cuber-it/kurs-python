<svg xmlns="http://www.w3.org/2000/svg" width="680" height="296" viewBox="0 0 680 296" font-family="Inter, 'Segoe UI', Arial, sans-serif">
  <title>Klassenattribut vs. Instanzattribut</title>
  <desc>Das Klassenattribut art ist ein Wert fuer alle Objekte. Das Instanzattribut name gehoert jedem Objekt einzeln.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect x="240" y="46" width="200" height="64" rx="12" fill="#EEEDFE" stroke="#534AB7" stroke-width="1"/>
  <text x="340" y="74" text-anchor="middle" font-size="15" font-weight="500" fill="#3C3489">class Hund</text>
  <text x="340" y="94" text-anchor="middle" font-size="12" font-family="'JetBrains Mono', Consolas, monospace" fill="#534AB7">art  -  Klassenattribut</text>

  <path d="M340 110 L340 150 L190 150 L190 176" fill="none" stroke="#534AB7" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
  <path d="M340 110 L340 150 L490 150 L490 176" fill="none" stroke="#534AB7" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
  <text x="340" y="144" text-anchor="middle" font-size="12" fill="#534AB7">ein Wert fuer alle</text>

  <rect x="90" y="180" width="200" height="92" rx="12" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/>
  <text x="106" y="208" font-size="14" font-weight="500" fill="#085041">rex</text>
  <text x="106" y="234" font-size="12" font-family="'JetBrains Mono', Consolas, monospace" fill="#0F6E56">name = 'Rex'   (eigen)</text>
  <text x="106" y="258" font-size="12" font-family="'JetBrains Mono', Consolas, monospace" fill="#888780">art = 'Canis l.'  (geteilt)</text>

  <rect x="390" y="180" width="200" height="92" rx="12" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/>
  <text x="406" y="208" font-size="14" font-weight="500" fill="#085041">bella</text>
  <text x="406" y="234" font-size="12" font-family="'JetBrains Mono', Consolas, monospace" fill="#0F6E56">name = 'Bella'  (eigen)</text>
  <text x="406" y="258" font-size="12" font-family="'JetBrains Mono', Consolas, monospace" fill="#888780">art = 'Canis l.'  (geteilt)</text>
</svg>
